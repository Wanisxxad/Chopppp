<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chineedz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a1a1a; color: #fff; margin: 0; }
        .page { display: none; }
        .active-page { display: block; }
        
        /* الهيدر والقوائم */
        header { background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .side-panel { position: fixed; top: 0; width: 300px; height: 100%; background: #262626; z-index: 2001; transition: 0.3s; padding: 20px; }
        #sideMenu { right: -300px; }
        #sideCart { left: -300px; }
        .panel-active { right: 0 !important; left: 0 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; }

        /* بطاقة الطلب - تصميم Shopify المرفق */
        .order-card-container { background: #fff; border-radius: 12px; padding: 20px; color: #000; margin: 20px 0; }
        .field-box { margin-bottom: 15px; }
        .field-label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 5px; text-align: right; }
        .field-label span { color: red; }
        .input-group { display: flex; border: 1px solid #d1d5db; border-radius: 6px; overflow: hidden; align-items: center; }
        .input-group input, .input-group select { flex: 1; padding: 12px; border: none; outline: none; font-size: 14px; text-align: right; color: #333; }
        .input-group .icon-area { background: #e5e7eb; padding: 12px; border-right: 1px solid #d1d5db; color: #4b5563; min-width: 45px; text-align: center; }

        /* الأزرار */
        .btn-confirm { background: #000; color: #fff; width: 100%; padding: 15px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; border: none; }
        .cat-link { display: block; padding: 15px 0; border-bottom: 1px solid #333; font-weight: 700; font-size: 18px; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="flex justify-between items-center px-4 py-3">
    <div class="flex items-center gap-4">
        <i class="fa-solid fa-bars text-xl cursor-pointer" onclick="togglePanel('sideMenu')"></i>
        <i class="fa-solid fa-magnifying-glass text-xl cursor-pointer" onclick="alert('البحث...')"></i>
    </div>
    <img src="https://i.postimg.cc/pLK2rngY/IMG-20260301-222638-543.jpg" class="h-8 cursor-pointer" onclick="showPage('homePage')">
    <div class="relative cursor-pointer" onclick="togglePanel('sideCart')">
        <i class="fa-solid fa-bag-shopping text-xl"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-white text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div id="sideMenu" class="side-panel">
    <div class="flex justify-between items-center mb-8">
        <span class="font-bold text-lg">Menu</span>
        <i class="fa-solid fa-xmark text-xl" onclick="closePanels()"></i>
    </div>
    <div class="nav-links">
        <a href="#" class="cat-link" onclick="filter('ALL')">جميع المنتجات</a>
        <a href="#" class="cat-link" onclick="filter('ENSEMBLES')">ENSEMBLES</a>
        <a href="#" class="cat-link" onclick="filter('BAGGY')">BAGGY PANTS</a>
        <a href="#" class="cat-link" onclick="filter('VESTE')">VESTE (ZIPPERS)</a>
        <a href="#" class="cat-link" onclick="filter('HOODIES')">HOODIES</a>
        <a href="#" class="cat-link" onclick="filter('JEANS')">JEANS</a>
        <a href="#" class="cat-link" onclick="filter('SHOES')">SHOES</a>
        <a href="#" class="cat-link" onclick="filter('TSHIRT')">T-SHIRTS</a>
    </div>
</div>

<main class="p-4">
    <div id="homePage" class="page active-page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold italic">الاكثر مبيعا</h2>
            <span class="text-sm text-gray-400">View all</span>
        </div>
        <div class="grid grid-cols-2 gap-4" id="mainGrid"></div>
    </div>

    <div id="detailsPage" class="page">
        <img id="dImg" src="" class="w-full rounded-lg mb-4">
        <h1 id="dTitle" class="text-2xl font-black mb-2 uppercase"></h1>
        <div class="text-xl font-bold mb-8 text-gray-300" id="dPrice"></div>

        <div class="order-card-container">
            <div class="field-box">
                <label class="field-label">الاسم كامل <span>*</span></label>
                <div class="input-group">
                    <input type="text" id="orderName" placeholder="First name">
                    <div class="icon-area"><i class="fa-solid fa-user"></i></div>
                </div>
            </div>

            <div class="field-box">
                <label class="field-label">رقم الهاتف <span>*</span></label>
                <div class="input-group">
                    <input type="tel" id="orderPhone" placeholder="Phone">
                    <div class="icon-area"><i class="fa-solid fa-phone"></i></div>
                </div>
            </div>

            <div class="field-box">
                <label class="field-label">الولاية Wilaya <span>*</span></label>
                <div class="input-group">
                    <select id="orderWilaya"></select>
                </div>
            </div>

            <div class="field-box">
                <label class="field-label">البلدية Commune <span>*</span></label>
                <div class="input-group">
                    <select id="orderCommune"></select>
                </div>
            </div>

            <div class="mt-6">
                <label class="field-label mb-3">نوع التوصيل</label>
                <div class="space-y-3">
                    <label class="flex justify-between items-center p-3 border border-gray-200 rounded-lg text-sm text-gray-700">
                        <div class="flex items-center gap-2">
                            <input type="radio" name="ship" value="600" checked class="accent-black w-4 h-4">
                            <span>مكتب التوصيل (600DA)</span>
                        </div>
                    </label>
                    <label class="flex justify-between items-center p-3 border border-gray-200 rounded-lg text-sm text-gray-700">
                        <div class="flex items-center gap-2">
                            <input type="radio" name="ship" value="800" class="accent-black w-4 h-4">
                            <span>إلى المنزل (800DA)</span>
                        </div>
                    </label>
                </div>
            </div>

            <button onclick="confirmOrder()" class="btn-confirm">
                تأكيد الطلبية <i class="fa-solid fa-bag-shopping"></i>
            </button>
        </div>

        <div class="mt-10">
            <h3 class="text-lg font-bold mb-4">You may also like</h3>
            <div class="grid grid-cols-2 gap-4" id="relatedGrid"></div>
        </div>
    </div>
</main>

<script>
    const products = [
        {id:1, cat:"ENSEMBLES", name:"Ensemble ALO", price:5500, img:"https://i.postimg.cc/KYryjMWw/IMG_20260210_225601_843.jpg"},
        {id:2, cat:"ENSEMBLES", name:"Ensemble Polo", price:5900, img:"https://i.postimg.cc/rwBs656R/IMG_20260210_222331_180.jpg"},
        {id:3, cat:"BAGGY", name:"Baggy Polo", price:2900, img:"https://i.postimg.cc/qMW56KDm/IMG_20260215_200828_193.jpg"},
        {id:4, cat:"VESTE", name:"Veste Signature", price:5900, img:"https://i.postimg.cc/kXLpRSYQ/IMG_20260215_200825_775.jpg"}
    ];

    function renderProducts(filter = 'ALL') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const list = filter === 'ALL' ? products : products.filter(p => p.cat === filter);
        list.forEach(p => {
            grid.innerHTML += `
                <div class="cursor-pointer" onclick="openProduct(${p.id})">
                    <div class="relative mb-2">
                        <img src="${p.img}" class="w-full aspect-[4/5] object-cover rounded-md">
                        <span class="absolute top-2 left-2 bg-white text-black text-[9px] px-2 py-1 font-bold rounded">Promotion</span>
                    </div>
                    <h4 class="text-[12px] font-bold truncate uppercase">${p.name}</h4>
                    <p class="text-sm font-bold">DA ${p.price}.00</p>
                </div>`;
        });
    }

    function openProduct(id) {
        const p = products.find(x => x.id == id);
        document.getElementById('homePage').classList.remove('active-page');
        document.getElementById('detailsPage').classList.add('active-page');
        document.getElementById('dImg').src = p.img;
        document.getElementById('dTitle').innerText = p.name;
        document.getElementById('dPrice').innerText = `DA ${p.price}.00`;
        
        // رندر قسم "You may also like"
        const rel = document.getElementById('relatedGrid');
        rel.innerHTML = products.filter(x => x.id !== id).slice(0, 2).map(x => `
            <div onclick="openProduct(${x.id})">
                <img src="${x.img}" class="w-full aspect-[4/5] object-cover rounded-md mb-2">
                <h4 class="text-[10px] font-bold truncate">${x.name}</h4>
                <p class="text-[12px] font-bold">DA ${x.price}.00</p>
            </div>
        `).join('');
        
        window.scrollTo(0,0);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        closePanels();
    }

    function togglePanel(id) {
        document.getElementById(id).classList.add('panel-active');
        document.getElementById('overlay').style.display = 'block';
    }

    function closePanels() {
        document.getElementById('sideMenu').classList.remove('panel-active');
        document.getElementById('sideCart').classList.remove('panel-active');
        document.getElementById('overlay').style.display = 'none';
    }

    function filter(cat) {
        renderProducts(cat);
        showPage('homePage');
    }

    async function confirmOrder() {
        alert("تم استلام طلبك! سنتواصل معك هاتفياً.");
    }

    window.onload = () => {
        renderProducts();
        const wil = document.getElementById('orderWilaya');
        wil.add(new Option("Wilaya الولاية", ""));
        ["Alger", "Oran", "Batna", "Constantine"].forEach(w => wil.add(new Option(w, w)));
        
        const com = document.getElementById('orderCommune');
        com.add(new Option("Commune البلدية", ""));
    }
</script>
</body>
</html>
