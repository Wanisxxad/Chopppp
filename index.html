<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNG Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fff; color: #000; margin: 0; overflow-x: hidden; }
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { 
            background: #fff; border-bottom: 1px solid #f2f2f2; 
            position: sticky; top: 0; z-index: 1000; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
        }
        .header-icon { font-size: 22px; cursor: pointer; padding: 10px; }
        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); width: 60px; cursor: pointer; }

        /* القائمة الجانبية */
        #sidebar { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #fff; z-index: 10000; transition: 0.4s; padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; }
        .menu-item { display: block; padding: 15px 0; border-bottom: 1px solid #f2f2f2; font-weight: 700; font-size: 18px; color: #000; cursor: pointer; }

        /* ستايل الخانات */
        .tng-label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 13px; margin-top: 15px; }
        .tng-input-group { background: #f8f8f8; border-radius: 10px; display: flex; align-items: center; border: 1px solid #eee; overflow: hidden; }
        .tng-icon-box { background: #fff; padding: 12px; border-left: 1px solid #eee; width: 45px; text-align: center; color: #333; }
        .tng-field { background: transparent; border: none; padding: 12px; width: 100%; outline: none; font-size: 14px; font-weight: bold; }
        
        .btn-confirm { background: #000; color: #fff; width: 100%; padding: 15px; border-radius: 50px; font-weight: 900; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* تكبير البطاقات وتعديل السعر */
        .product-card { background: #fff; border: 1px solid #f8f8f8; border-radius: 12px; padding: 10px; transition: 0.3s; cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .price-text { color: #000; font-size: 11px; font-weight: 700; margin-top: 2px; }
        .title-text { font-size: 11px; font-weight: 900; text-transform: uppercase; margin-top: 8px; }

        .cart-badge { background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; position: absolute; top: 10px; left: 5px; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div class="flex justify-between items-center mb-8">
        <span class="font-black text-xl">MENU</span>
        <i class="fa-solid fa-xmark text-xl" onclick="toggleMenu()"></i>
    </div>
    <div class="menu-item" onclick="filterCategory('all')">All Collections</div>
    <div class="menu-item" onclick="filterCategory('Ensemble')">Ensembles</div>
    <div class="menu-item" onclick="filterCategory('Baggy')">Baggy Pants</div>
    <div class="menu-item" onclick="filterCategory('Jacket')">Jackets</div>
</div>

<header>
    <i class="fa-solid fa-bars-staggered header-icon" onclick="toggleMenu()"></i>
    <div class="logo-container" onclick="showPage('homePage')">
        <img src="https://i.postimg.cc/CKWWbdgn/IMG-20260304-140312.jpg" alt="Logo" class="rounded">
    </div>
    <div class="flex items-center relative" onclick="showPage('cartPage')">
        <i class="fa-solid fa-bag-shopping header-icon"></i>
        <span id="cartCount" class="cart-badge">0</span>
    </div>
</header>

<main class="p-4 max-w-md mx-auto">
    <div id="homePage" class="page active-page">
        <div class="grid grid-cols-2 gap-4" id="mainGrid"></div>
    </div>

    <div id="detailsPage" class="page">
        <button onclick="showPage('homePage')" class="text-gray-400 text-xs font-bold mb-4 uppercase"><i class="fa-solid fa-arrow-right ml-1"></i> رجوع</button>
        <img id="dImg" src="" class="w-full aspect-[4/5] object-cover rounded-lg mb-4">
        <h1 id="dTitle" class="text-xl font-black uppercase italic"></h1>
        <p id="dPrice" class="text-black font-black text-lg mb-6"></p>

        <div id="orderSection" class="bg-white p-4 border rounded-2xl shadow-sm mb-10">
            <h3 class="font-black text-center border-b pb-2 mb-4">إتمام الطلب</h3>
            
            <label class="tng-label">الاسم كامل *</label>
            <div class="tng-input-group">
                <div class="tng-icon-box"><i class="fa-solid fa-user"></i></div>
                <input type="text" id="custName" class="tng-field" placeholder="Full Name">
            </div>

            <label class="tng-label">رقم الهاتف *</label>
            <div class="tng-input-group">
                <div class="tng-icon-box"><i class="fa-solid fa-phone"></i></div>
                <input type="tel" id="custPhone" class="tng-field" placeholder="Phone">
            </div>

            <label class="tng-label">Wilaya الولاية *</label>
            <div class="tng-input-group">
                <div class="tng-icon-box"><i class="fa-solid fa-location-dot"></i></div>
                <select id="custWilaya" class="tng-field"></select>
            </div>

            <label class="tng-label">Delivery نوع التوصيل *</label>
            <div class="tng-input-group">
                <div class="tng-icon-box"><i class="fa-solid fa-truck"></i></div>
                <select id="shipType" class="tng-field">
                    <option>توصيل إلى باب المنزل (900DA)</option>
                    <option>توصيل للمكتب (400DA)</option>
                </select>
            </div>

            <button onclick="confirmAndToCart()" class="btn-confirm">
                <i class="fa-solid fa-lock"></i> تأكيد الطلبية
            </button>
        </div>
    </div>

    <div id="cartPage" class="page">
        <h2 class="font-black text-xl mb-4 border-b pb-2 uppercase italic">My Orders / طلباتي</h2>
        <div id="cartItems"></div>
    </div>
</main>

<script>
    const products = [
        {id:1, name:"Ensemble Polo", price:5900, category:"Ensemble", img:"https://i.postimg.cc/KYryjMWw/IMG_20260210_225601_843.jpg"},
        {id:2, name:"Ensemble ALO", price:5500, category:"Ensemble", img:"https://i.postimg.cc/rwBs656R/IMG_20260210_222331_180.jpg"},
        {id:3, name:"Ensemble Synical", price:5900, category:"Ensemble", img:"https://i.postimg.cc/3xx8P9fc/IMG_20260210_224344_638.jpg"},
        {id:4, name:"Baggy Streetwear", price:2900, category:"Baggy", img:"https://i.postimg.cc/qMW56KDm/IMG_20260215_200828_193.jpg"},
        {id:5, name:"Premium Hoodie", price:3500, category:"Jacket", img:"https://i.postimg.cc/kXLpRSYQ/IMG_20260215_200825_775.jpg"}
    ];

    // قائمة 58 ولاية كاملة
    const wilayas = ["01 Adrar","02 Chlef","03 Laghouat","04 Oum El Bouaghi","05 Batna","06 Bejaia","07 Biskra","08 Bechar","09 Blida","10 Bouira","11 Tamanrasset","12 Tebessa","13 Tlemcen","14 Tiaret","15 Tizi Ouzou","16 Algiers","17 Djelfa","18 Jijel","19 Setif","20 Saida","21 Skikda","22 Sidi Bel Abbes","23 Annaba","24 Guelma","25 Constantine","26 Medea","27 Mostaganem","28 M'Sila","29 Mascara","30 Ouargla","31 Oran","32 El Bayadh","33 Illizi","34 Bordj Bou Arreridj","35 Boumerdes","36 El Tarf","37 Tindouf","38 Tissemsilt","39 El Oued","40 Khenchela","41 Souk Ahras","42 Tipaza","43 Mila","44 Ain Defla","45 Naama","46 Ain Temouchent","47 Ghardaia","48 Relizane","49 Timimoun","50 Bordj Badji Mokhtar","51 Ouled Djellal","52 Beni Abbes","53 In Salah","54 In Guezzam","55 Touggourt","56 Djanet","57 El Meghaier","58 El Meniaa"];

    let cart = [];
    let currentP = null;

    function render(data = products) {
        const grid = document.getElementById('mainGrid'); grid.innerHTML = "";
        data.forEach(p => {
            grid.innerHTML += `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <img src="${p.img}" class="w-full aspect-[4/5] object-cover rounded-lg">
                    <div class="text-center">
                        <h3 class="title-text">${p.name}</h3>
                        <p class="price-text">${p.price} DA</p>
                    </div>
                </div>`;
        });
    }

    function openProduct(id) {
        currentP = products.find(x => x.id == id);
        document.getElementById('dTitle').innerText = currentP.name;
        document.getElementById('dPrice').innerText = currentP.price + " DA";
        document.getElementById('dImg').src = currentP.img;
        showPage('detailsPage');
    }

    function confirmAndToCart() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        if(!name || !phone) return alert("الرجاء إدخال الاسم والهاتف!");

        cart.push({...currentP, date: new Date().toLocaleDateString()});
        document.getElementById('cartCount').innerText = cart.length;
        
        alert("تم إرسال الطلب بنجاح!");
        showPage('cartPage');
    }

    function renderCart() {
        const div = document.getElementById('cartItems');
        div.innerHTML = cart.length ? "" : "<p class='text-center text-gray-400 mt-10'>لا توجد طلبات</p>";
        cart.forEach((item, i) => {
            div.innerHTML += `
            <div class="flex justify-between p-4 bg-gray-50 mb-3 rounded-xl items-center border">
                <img src="${item.img}" class="w-14 h-14 rounded-lg object-cover">
                <div class="flex-1 mr-4">
                    <h4 class="font-black text-xs uppercase">${item.name}</h4>
                    <p class="text-black font-bold text-[10px]">${item.price} DA</p>
                </div>
                <div class="text-green-600 font-bold text-[10px]"><i class="fa-solid fa-circle-check"></i> مؤكد</div>
            </div>`;
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(id === 'cartPage') renderCart();
        window.scrollTo(0,0);
    }

    function toggleMenu() {
        const side = document.getElementById('sidebar');
        side.classList.toggle('open');
        document.getElementById('overlay').style.display = side.classList.contains('open') ? 'block' : 'none';
    }

    function filterCategory(cat) {
        toggleMenu();
        const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
        render(filtered);
        showPage('homePage');
    }

    window.onload = () => {
        render();
        const sel = document.getElementById('custWilaya');
        wilayas.forEach(w => sel.add(new Option(w, w)));
    }
</script>

</body>
</html>
