<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChineeDZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fff; color: #000; margin: 0; }
        .page { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .active-page { display: block; opacity: 1; }
        
        header { background: #fff; border-bottom: 1px solid #f3f4f6; position: sticky; top: 0; z-index: 1000; }
        .side-panel { position: fixed; top: 0; width: 280px; height: 100%; background: #fff; z-index: 2001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.1); }
        #sideMenu { right: -100%; }
        #sideCart { left: -100%; }
        .panel-active { right: 0 !important; left: 0 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; backdrop-filter: blur(3px); }

        /* ستايل زر التاكيد والفورم */
        .btn-black { background: #000; color: #fff; width: 100%; padding: 16px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-black:active { transform: scale(0.97); }
        
        .order-card { border: 1px solid #eee; border-radius: 12px; padding: 20px; background: #fff; }
        .input-label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 14px; text-align: right; }
        .input-label span { color: red; }
        
        .input-wrapper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .input-wrapper input, .input-wrapper select { flex: 1; padding: 12px; border: none; outline: none; font-size: 14px; background: transparent; text-align: right; }
        .input-wrapper .icon-box { background: #f9f9f9; padding: 14px; border-right: 1px solid #ddd; color: #888; width: 45px; text-align: center; }

        .delivery-option { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .delivery-option input { width: 18px; height: 18px; accent-color: #000; }

        .category-item { padding: 15px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 700; color: #333; transition: 0.2s; }
    </style>
</head>
<body>

<header class="flex justify-between items-center px-5 py-4">
    <div class="flex items-center gap-5">
        <i class="fa-solid fa-bars-staggered text-xl cursor-pointer" onclick="togglePanel('sideMenu')"></i>
        <i class="fa-solid fa-magnifying-glass text-xl cursor-pointer"></i>
    </div>
    <div class="text-2xl font-black italic cursor-pointer tracking-tighter" onclick="showPage('homePage')">CHINEE<span class="text-gray-400">DZ</span></div>
    <div class="relative cursor-pointer" onclick="togglePanel('sideCart')">
        <i class="fa-solid fa-bag-shopping text-xl"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="sideMenu" class="side-panel">
    <div class="flex justify-between items-center mb-10">
        <span class="font-black text-xl italic uppercase">Categories</span>
        <i class="fa-solid fa-xmark text-xl" onclick="closeAll()"></i>
    </div>
    <div class="flex flex-col">
        <div class="category-item" onclick="filter('ALL')">جميع المنتجات (ALL)</div>
        <div class="category-item" onclick="filter('ENSEMBLES')">أطقم (ENSEMBLES)</div>
        <div class="category-item" onclick="filter('BAGGY')">سراويل واسعة (BAGGY PANTS)</div>
        <div class="category-item" onclick="filter('VESTE')">سترات (VESTE & ZIPPER)</div>
        <div class="category-item" onclick="filter('TSHIRT')">تيشرتات (T-SHIRTS)</div>
        <div class="category-item" onclick="filter('POLO')">بولو (POLO SHIRTS)</div>
        <div class="category-item" onclick="filter('ACCESS')">إكسسوارات (ACCESSORIES)</div>
    </div>
</div>

<div id="sideCart" class="side-panel">
    <div class="flex justify-between items-center mb-10">
        <span class="font-black text-xl italic">My Bag</span>
        <i class="fa-solid fa-xmark text-xl" onclick="closeAll()"></i>
    </div>
    <div id="cartList" class="space-y-4">
        <p class="text-center text-gray-400 mt-20">حقيبتك فارغة</p>
    </div>
</div>

<main class="p-4 max-w-lg mx-auto min-h-[80vh]">
    <div id="homePage" class="page active-page">
        <div class="flex justify-between items-end mb-6">
            <h2 id="currentCatTitle" class="text-xl font-black italic uppercase">Popular Items</h2>
            <span class="text-[10px] font-bold text-gray-400">58 Wilayas Delivery</span>
        </div>
        <div class="grid grid-cols-2 gap-4" id="mainGrid"></div>
    </div>

    <div id="detailsPage" class="page">
        <button onclick="showPage('homePage')" class="text-xs font-bold text-gray-400 mb-4 inline-flex items-center">
            <i class="fa-solid fa-chevron-right ml-1"></i> العودة للتسوق
        </button>
        <img id="dImg" src="" class="w-full rounded-2xl mb-6 shadow-sm">
        <h1 id="dTitle" class="text-2xl font-black mb-1 uppercase italic"></h1>
        <div class="text-xl font-bold mb-8" id="dPrice"></div>
        
        <button onclick="addToCart()" class="btn-black mb-12">أضف إلى حقيبة التسوق</button>

        <div class="order-card shadow-sm">
            <label class="input-label">الاسم كامل <span>*</span></label>
            <div class="input-wrapper">
                <input type="text" id="custName" placeholder="First name">
                <div class="icon-box"><i class="fa-solid fa-user"></i></div>
            </div>

            <label class="input-label">رقم الهاتف <span>*</span></label>
            <div class="input-wrapper">
                <input type="tel" id="custPhone" placeholder="Phone">
                <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
            </div>

            <label class="input-label">Wilaya الولاية <span>*</span></label>
            <div class="input-wrapper">
                <select id="custWilaya" onchange="updateCommunes()">
                    <option value="">Wilaya الولاية</option>
                </select>
                <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
            </div>

            <label class="input-label">Commune البلدية <span>*</span></label>
            <div class="input-wrapper">
                <select id="custCommune">
                    <option value="">Commune البلدية</option>
                </select>
                <div class="icon-box"><i class="fa-solid fa-map-location-dot"></i></div>
            </div>

            <label class="input-label">نوع التوصيل</label>
            <div class="mb-5 bg-gray-50 p-2 rounded-lg">
                <div class="delivery-option">
                    <label for="off">مكتب التوصيل (600DA)</label>
                    <input type="radio" name="delivery" id="off" value="مكتب التوصيل (600DA)" checked>
                </div>
                <div class="delivery-option">
                    <label for="home">الى المنزل (800DA)</label>
                    <input type="radio" name="delivery" id="home" value="الى المنزل (800DA)">
                </div>
            </div>

            <button onclick="sendOrder()" class="btn-black">
                <i class="fa-solid fa-bag-shopping"></i>
                تأكيد الطلبية
            </button>
        </div>
    </div>
</main>

<footer class="bg-gray-50 mt-20 py-16 px-6 text-center border-t border-gray-100">
    <p class="font-black italic text-xl mb-2">CHINEEDZ</p>
    <div class="mt-10 text-[9px] text-gray-300 font-bold uppercase tracking-[4px]">© 2026 ChineeDZ Store</div>
</footer>

<script>
    // إعادة جميع الألبسة الأصلية
    const products = [
        {id:1, cat:"ENSEMBLES", name:"Ensemble ALO", price:5500, img:"https://i.postimg.cc/KYryjMWw/IMG_20260210_225601_843.jpg"},
        {id:2, cat:"ENSEMBLES", name:"Ensemble Polo", price:5900, img:"https://i.postimg.cc/rwBs656R/IMG_20260210_222331_180.jpg"},
        {id:3, cat:"ENSEMBLES", name:"Ensemble Synical", price:5900, img:"https://i.postimg.cc/3xx8P9fc/IMG_20260210_224344_638.jpg"},
        {id:4, cat:"BAGGY", name:"Baggy Streetwear", price:2900, img:"https://i.postimg.cc/qMW56KDm/IMG_20260215_200828_193.jpg"},
        {id:5, cat:"VESTE", name:"Veste Zipper", price:4500, img:"https://i.postimg.cc/kXLpRSYQ/IMG_20260215_200825_775.jpg"},
        {id:6, cat:"POLO", name:"T-shirt Polo Classic", price:1800, img:"https://i.postimg.cc/kGTGLZCL/IMG_20260210_222158_000.jpg"}
    ];

    const wilayas = ["01-أدرار", "02-الشلف", "05-باتنة", "16-الجزائر", "19-سطيف", "25-قسنطينة", "31-وهران"];

    function render(catFilter = 'ALL') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const filtered = catFilter === 'ALL' ? products : products.filter(p => p.cat === catFilter);
        
        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="cursor-pointer group" onclick="openProduct(${p.id})">
                    <div class="relative overflow-hidden rounded-xl mb-3 bg-gray-50">
                        <img src="${p.img}" class="w-full aspect-[4/5] object-cover">
                    </div>
                    <h4 class="text-[11px] font-bold uppercase truncate">${p.name}</h4>
                    <p class="text-sm font-black">${p.price} DA</p>
                </div>`;
        });
    }

    function openProduct(id) {
        const p = products.find(x => x.id == id);
        showPage('detailsPage');
        document.getElementById('dImg').src = p.img;
        document.getElementById('dTitle').innerText = p.name;
        document.getElementById('dPrice').innerText = `${p.price} DA`;
        window.scrollTo(0,0);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        closeAll();
    }

    let count = 0;
    function addToCart() {
        count++;
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartList').innerHTML = `<div class='p-4 text-center font-bold border-b'>تمت الإضافة: ${document.getElementById('dTitle').innerText}</div>`;
        togglePanel('sideCart');
    }

    function togglePanel(id) {
        document.getElementById(id).classList.add('panel-active');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeAll() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('panel-active'));
        document.getElementById('overlay').style.display = 'none';
    }

    function filter(cat) {
        document.getElementById('currentCatTitle').innerText = cat === 'ALL' ? 'Popular Items' : cat;
        render(cat);
        showPage('homePage');
    }

    async function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const wilaya = document.getElementById('custWilaya').value;
        const commune = document.getElementById('custCommune').value;
        const delivery = document.querySelector('input[name="delivery"]:checked').value;

        if(!name || !phone || !wilaya) return alert("يرجى ملء الاسم ورقم الهاتف والولاية");
        
        const msg = `🚀 طلب جديد من ChineeDZ:\n📦 المنتج: ${document.getElementById('dTitle').innerText}\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n📍 الولاية: ${wilaya}\n🏡 البلدية: ${commune}\n🚚 نوع التوصيل: ${delivery}`;
        
        await fetch(`https://api.telegram.org/bot8356805368:AAEy8AILHp8lODLxPeS-Gp6dxUQduoWrtVc/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: '8293116710', text: msg})
        });
        alert("تم إرسال طلبك بنجاح! سنتصل بك قريباً.");
    }

    function updateCommunes() {
        const comSelect = document.getElementById('custCommune');
        comSelect.innerHTML = '<option value="">جاري التحميل...</option>';
        setTimeout(() => {
            comSelect.innerHTML = `
                <option value="البلدية المركزية">البلدية المركزية</option>
                <option value="بلدية فرعية 1">بلدية فرعية 1</option>
            `;
        }, 300);
    }

    window.onload = () => {
        render();
        const sel = document.getElementById('custWilaya');
        wilayas.forEach(w => sel.add(new Option(w, w)));
    }
</script>
</body>
</html>
