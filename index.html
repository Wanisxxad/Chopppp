<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINEEDZ STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #ffffff; color: #1a1a1a; margin: 0; scroll-behavior: smooth; }
        .announcement { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; }
        
        header { background: #ffffff; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; }
        .header-logo { height: 80px; width: auto; border-radius: 8px; cursor: pointer; }

        .side-panel { position: fixed; top: 0; width: 300px; height: 100%; background: #ffffff; z-index: 200; transition: 0.4s ease; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 25px; overflow-y: auto; }
        #sideMenu { right: -320px; } 
        #sideCart { left: -320px; } 
        .side-panel.active { right: 0 !important; left: 0 !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }

        .opt-btn { background: #f5f5f5; color: #000; border: 1px solid #e5e5e5; border-radius: 10px; padding: 8px 15px; font-weight: 600; cursor: pointer; }
        .opt-btn.active { background: #000; color: #fff; border-color: #000; }

        .form-card { background: #f9f9f9; border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid #eee; }
        .input-box { display: flex; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 12px; background: #fff; }
        .input-box input, .input-box select { flex: 1; border: none; padding: 12px; outline: none; text-align: right; font-size: 14px; background: transparent; }
        .input-box i { background: #fcfcfc; padding: 12px; color: #888; border-left: 1px solid #eee; }

        .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .product-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 15px; overflow: hidden; cursor: pointer; }
    </style>
</head>
<body>

<div class="announcement">🚚 التوصيل متاح لـ 58 ولاية - الدفع عند الاستلام</div>

<header>
    <i class="fa-solid fa-bars-staggered text-2xl cursor-pointer" onclick="openPanel('sideMenu')"></i>
    <img src="https://i.postimg.cc/pLK2rngY/IMG-20260301-222638-543.jpg" class="header-logo" onclick="location.reload()">
    <div class="relative cursor-pointer" onclick="openPanel('sideCart')">
        <i class="fa-solid fa-bag-shopping text-2xl"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center">0</span>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div class="side-panel" id="sideMenu">
    <div class="flex justify-between items-center mb-8 border-b pb-4">
        <span class="text-xl font-bold">الأقسام</span>
        <i class="fa-solid fa-xmark text-2xl cursor-pointer" onclick="closePanels()"></i>
    </div>
    <ul class="space-y-6 font-bold text-gray-700">
        <li class="flex items-center gap-3 cursor-pointer" onclick="filterProducts('all', true)"><i class="fa-solid fa-border-all"></i> الكل</li>
        <li class="flex items-center gap-3 cursor-pointer" onclick="filterProducts('ensemble', true)"><i class="fa-solid fa-shirt"></i> أطقم</li>
        <li class="flex items-center gap-3 cursor-pointer" onclick="filterProducts('veste', true)"><i class="fa-solid fa-vest"></i> فيستات</li>
        <li class="flex items-center gap-3 cursor-pointer" onclick="filterProducts('hoodie', true)"><i class="fa-solid fa-user-ninja"></i> هوديز</li>
        <li class="flex items-center gap-3 cursor-pointer" onclick="filterProducts('pants', true)"><i class="fa-solid fa-pants"></i> سراويل</li>
    </ul>
</div>

<div class="side-panel" id="sideCart">
    <div class="flex justify-between items-center mb-8 border-b pb-4">
        <span class="text-xl font-bold">سلة التسوق</span>
        <i class="fa-solid fa-xmark text-2xl cursor-pointer" onclick="closePanels()"></i>
    </div>
    <div id="cartItems"><p class="text-center text-gray-400 mt-10">السلة فارغة</p></div>
    <div id="cartTotal" class="mt-10 pt-4 border-t hidden">
        <div class="flex justify-between font-bold mb-4"><span>الإجمالي:</span><span id="totalPrice">0 DA</span></div>
        <button onclick="closePanels(); window.scrollTo({top: document.getElementById('orderForm').offsetTop - 100, behavior:'smooth'});" class="w-full bg-black text-white py-3 rounded-xl font-bold">إتمام الطلب</button>
    </div>
</div>

<main class="max-w-md mx-auto p-5">
    <div id="mainDisplay">
        <img id="mainImg" src="https://i.postimg.cc/bv1Jqd8Z/IMG_20260210_222332_760.jpg" class="w-full h-[400px] object-cover rounded-3xl mb-4 shadow-sm">
        <h1 id="mainTitle" class="text-2xl font-bold mb-1 uppercase">ENSEMBLE CORTEIZ 2026</h1>
        <div class="flex items-center gap-3 mb-6">
            <span id="mainPrice" class="text-xl font-black">3,200 DA</span>
            <span class="text-gray-400 line-through text-sm">6,900 DA</span>
        </div>

        <div class="mb-4">
            <p class="text-xs font-bold text-gray-500 mb-2">اللون</p>
            <div class="flex gap-2">
                <button class="opt-btn color-opt active" onclick="selectOpt(this, 'color')">Gris</button>
                <button class="opt-btn color-opt" onclick="selectOpt(this, 'color')">Noir</button>
            </div>
        </div>

        <div class="mb-6">
            <p class="text-xs font-bold text-gray-500 mb-2">المقاس</p>
            <div class="flex gap-2">
                <button class="opt-btn active" onclick="selectOpt(this, 'size')">M</button>
                <button class="opt-btn" onclick="selectOpt(this, 'size')">L</button>
                <button class="opt-btn" onclick="selectOpt(this, 'size')">XL</button>
            </div>
        </div>

        <button onclick="addToCart()" class="w-full border-2 border-black text-black py-3 rounded-xl font-bold mb-8 hover:bg-black hover:text-white transition">إضافة إلى السلة 🛒</button>

        <div class="form-card" id="orderForm">
            <h3 class="text-center font-bold mb-4">بيانات الطلب</h3>
            <div class="input-box"><input type="text" id="custName" placeholder="الإسم الكامل"><i class="fa-solid fa-user"></i></div>
            <div class="input-box"><input type="tel" id="custPhone" placeholder="رقم الهاتف"><i class="fa-solid fa-phone"></i></div>
            
            <div class="input-box">
                <select id="custWilaya">
                    <option value="">اختر الولاية (58 ولاية)</option>
                </select>
                <i class="fa-solid fa-map"></i>
            </div>

            <div class="input-box"><input type="text" id="custCommune" placeholder="البلدية"><i class="fa-solid fa-map-marker-alt"></i></div>
            <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-xl font-bold text-lg">تأكيد الشراء الآن</button>
        </div>
    </div>

    <h2 class="text-lg font-bold mb-4 mt-10 border-r-4 border-black pr-2" id="scrollPoint">منتجات أخرى</h2>
    <div class="grid grid-cols-2 gap-4" id="otherProducts"></div>
</main>

<script>
const token = "8356805368:AAEy8AILHp8lODLxPeS-Gp6dxUQduoWrtVc";
const chat_id = "8293116710";

// جميع الولايات الجزائرية
const wilayas = [
    "01-أدرار", "02-الشلف", "03-الأغواط", "04-أم البواقي", "05-باتنة", "06-بجاية", "07-بسكرة", "08-بشار", "09-البليدة", "10-البويرة",
    "11-تمنراست", "12-تبسة", "13-تلمسان", "14-تيارت", "15-تيزي وزو", "16-الجزائر", "17-الجلفة", "18-جيجل", "19-سطيف", "20-سعيدة",
    "21-سكيكدة", "22-سيدي بلعباس", "23-عنابة", "24-قالمة", "25-قسنطينة", "26-المدية", "27-مستغانم", "28-المسيلة", "29-معسكر", "30-ورقلة",
    "31-وهران", "32-البيض", "33-إليزي", "34-برج بوعريريج", "35-بومرداس", "36-الطارف", "37-تندوف", "38-تيسمسيلت", "39-الوادي", "40-خنشلة",
    "41-سوق أهراس", "42-تيبازة", "43-ميلة", "44-عين الدفلة", "45-النعامة", "46-عين تموشنت", "47-غرداية", "48-غليزان", "49-تيميمون", "50-برج باجي مختار",
    "51-أولاد جلال", "52-بني عباس", "53-عين صالح", "54-عين قزام", "55-تقرت", "56-جانت", "57-المغير", "58-المنيعة"
];

const products = [
    { title: "Ensemble Polo Summer", price: 5900, img: "https://i.postimg.cc/KYryjMWw/IMG_20260210_225601_843.jpg", category: "ensemble" },
    { title: "Baggy Pants Premium", price: 2900, img: "https://i.postimg.cc/Gpp4xb1h/IMG_20260210_223009_331.jpg", category: "pants" },
    { title: "Hoodie Synical High", price: 4500, img: "https://i.postimg.cc/mggL0Vp0/IMG_20260210_224350_951.jpg", category: "hoodie" },
    { title: "Veste Corteiz Special", price: 3200, img: "https://i.postimg.cc/bv1Jqd8Z/IMG_20260210_222332_760.jpg", category: "veste" }
];

let cart = [];
let currentSelection = { color: 'Gris', size: 'M' };

// ملء الولايات تلقائياً
function fillWilayas() {
    const select = document.getElementById('custWilaya');
    wilayas.forEach(w => {
        let opt = document.createElement('option');
        opt.value = w;
        opt.innerHTML = w;
        select.appendChild(opt);
    });
}

function openPanel(id) {
    document.getElementById(id).classList.add('active');
    document.getElementById('overlay').style.display = 'block';
}

function closePanels() {
    document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('overlay').style.display = 'none';
}

function selectOpt(btn, type) {
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSelection[type] = btn.innerText;
}

function filterProducts(cat, scroll = false) {
    const container = document.getElementById('otherProducts');
    container.innerHTML = "";
    const list = cat === 'all' ? products : products.filter(p => p.category === cat);
    list.forEach(p => {
        container.innerHTML += `
            <div class="product-card p-2 shadow-sm" onclick="loadProduct('${p.title}')">
                <img src="${p.img}" class="w-full h-40 object-cover rounded-xl mb-2">
                <p class="text-[10px] font-bold truncate">${p.title}</p>
                <p class="text-xs font-black">${p.price} DA</p>
            </div>`;
    });
    if(scroll) {
        closePanels();
        window.scrollTo({top: document.getElementById('scrollPoint').offsetTop - 100, behavior: 'smooth'});
    }
}

function loadProduct(title) {
    const p = products.find(i => i.title === title);
    if(p) {
        document.getElementById('mainImg').src = p.img;
        document.getElementById('mainTitle').innerText = p.title;
        document.getElementById('mainPrice').innerText = p.price + " DA";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
}

function addToCart() {
    cart.push({
        title: document.getElementById('mainTitle').innerText,
        price: document.getElementById('mainPrice').innerText,
        img: document.getElementById('mainImg').src,
        color: currentSelection.color,
        size: currentSelection.size
    });
    updateCartUI();
    openPanel('sideCart');
}

function updateCartUI() {
    const container = document.getElementById('cartItems');
    document.getElementById('cartCount').innerText = cart.length;
    if(cart.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 mt-10">السلة فارغة</p>';
        document.getElementById('cartTotal').classList.add('hidden');
    } else {
        container.innerHTML = cart.map(i => `
            <div class="cart-item">
                <img src="${i.img}">
                <div class="flex-1">
                    <p class="text-[11px] font-bold">${i.title}</p>
                    <p class="text-[10px] text-gray-500">${i.color} | ${i.size}</p>
                </div>
            </div>
        `).join('');
        document.getElementById('cartTotal').classList.remove('hidden');
        document.getElementById('totalPrice').innerText = cart.reduce((s, i) => s + parseInt(i.price), 0) + " DA";
    }
}

async function submitOrder() {
    const n = document.getElementById('custName').value;
    const p = document.getElementById('custPhone').value;
    const w = document.getElementById('custWilaya').value;
    const c = document.getElementById('custCommune').value;

    if(!n || !p || !w || !c) return alert("يرجى إكمال كافة البيانات");

    let items = cart.map(i => `- ${i.title} (${i.color}/${i.size})`).join('\n');
    if(cart.length === 0) items = `- ${document.getElementById('mainTitle').innerText} (${currentSelection.color}/${currentSelection.size})`;

    const msg = `🚀 *طلب جديد من المتجر*\n\n📦 *المنتجات:*\n${items}\n\n👤 *الزبون:* ${n}\n📞 *الهاتف:* ${p}\n📍 *العنوان:* ${w} - ${c}`;

    await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id, text: msg, parse_mode: 'Markdown'})
    });
    alert("تم الطلب بنجاح! سنتصل بك قريباً.");
    cart = []; updateCartUI();
}

window.onload = () => {
    fillWilayas();
    filterProducts('all', false); // false تمنع النزول التلقائي عند التحميل
};
</script>
</body>
</html>
